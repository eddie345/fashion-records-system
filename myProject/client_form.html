<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client & Measurement Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { background-color: #212529; color: white; width: 250px; min-height: 100vh; padding: 20px 0; position: fixed; }
        .sidebar .nav-link { color: #adb5bd; padding: 10px 20px; font-weight: 500; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background-color: #343a40; }
        .main-content { margin-left: 250px; padding: 30px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; margin-top: 60px; padding: 15px; }
        }
        .form-section-title { font-weight: 600; color: #495057; border-bottom: 2px solid #e9ecef; padding-bottom: 5px; margin-bottom: 20px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="sidebar d-none d-md-block">
        <h4 class="text-center mb-4 px-3">Beon Fidence</h4>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="client_form.html">Clients & Measurements</a>
            <a class="nav-link" href="inventory.html">Inventory Management</a>
        </nav>
    </div>

    <!-- Mobile navbar -->
    <nav class="navbar navbar-dark bg-dark d-md-none fixed-top w-100 px-3">
        <a class="navbar-brand" href="#">Beon Fidence</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mobileMenu">
            <ul class="navbar-nav ms-auto mt-2">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="client_form.html">Clients & Measurements</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html">Inventory</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Add New Client</h2>
        </div>
        
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form id="clientMeasurementForm">
                    <h5 class="form-section-title mt-0">Personal Contact Information</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted">First Name</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Last Name</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Email Address</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Phone Number</label>
                            <input type="tel" class="form-control" name="phone">
                        </div>
                    </div>

                    <h5 class="form-section-title">Precise Body Measurements (Inches)</h5>
                    <div class="row g-3">
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Chest / Bust</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[chest]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Waist</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[waist]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Hips</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[hips]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Inseam</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[inseam]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Neck</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[neck]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Shoulder Width</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[shoulder]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Sleeve Length</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[sleeve]">
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label text-muted">Bicep</label>
                            <input type="number" step="0.1" class="form-control" name="measurements[bicep]">
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top text-end">
                        <button type="button" class="btn btn-secondary me-2">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4">Save Client Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('clientMeasurementForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Typically here we would fetch API via POST
            alert('Client measurements successfully archived into the Database.');
        });
    </script>
</body>
</html>
