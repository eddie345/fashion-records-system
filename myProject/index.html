<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beon Fidence Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #e9ecef; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-card { 
            max-width: 420px; 
            width: 100%; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <div class="card login-card border-0">
        <div class="card-body">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark mb-1">Beon Fidence</h3>
                <p class="text-muted">Fashion Record System</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold">Username</label>
                    <input type="text" class="form-control form-control-lg bg-light" placeholder="e.g. admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-lg bg-light" placeholder="****" required>
                </div>
                <button type="button" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="window.location.href='dashboard.html'">Sign In</button>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-muted">Authorized Personnel Only.</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
